name: Deploy to GitHub Pages

on:
  push:
    branches:
      - ALCSC-Webpage

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@FULL_40_CHAR_SHA

      - name: Setup Node.js
        uses: actions/setup-node@FULL_40_CHAR_SHA
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Docusaurus site
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@FULL_40_CHAR_SHA
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/build
          publish_branch: gh-pages
          cname: www.alcopilotskills.com
